<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt hàng thành công</title>

    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../css/bootstrap-icons.css">
    <link rel="stylesheet" href="../css/mainstyle.css">
</head>

<body class="bg-light">


<header class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="homepage.html">
                <img src="../img/logo.png" alt="Rau Sạch" width="100px" class="me-2">
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item "><a class="nav-link " href="homepage.html">Trang chủ</a></li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Sản phẩm
                        </a>

                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Rau củ</a></li>
                            <li><a class="dropdown-item" href="#">Trái cây</a></li>
                            <li><a class="dropdown-item" href="#">Rau lá</a></li>
             
                            <li><a class="dropdown-item" href="produce.html">Tất cả sản phẩm</a></li>
                        </ul>
                    </li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Giới thiệu</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Đăng nhập/ Đăng ký</a></li>
                    <li class="nav-item">
                        <a class="nav-link" href="cart.html" id="cart-icon" style="position:relative;">
                            <img src="../icon/icons8-cart-48.png" alt="" style="width:28px;vertical-align:middle;">
                            <span id="cart-badge" class="badge bg-danger" style="position:absolute;top:0;right:-8px;font-size:0.65rem;">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </header>


<div class="container my-5">
    <div class="card shadow-lg p-5 text-center">

        <h2 class="text-success mb-3">
            <i class="bi bi-check-circle-fill"></i>
            Đặt hàng thành công!
        </h2>

        <p class="mb-4">Cảm ơn bạn đã tin tưởng và mua hàng tại Rau Sạch.</p>

        <div id="orderInfo" class="text-start mt-4"></div>

        <a href="homepage.html" class="btn btn-success mt-4">
            Quay về trang chủ
        </a>

    </div>
</div>


<footer class="bg-success text-white text-center py-3">
    © 2026 Rau Sạch
</footer>

<script>


let order = JSON.parse(localStorage.getItem("order"));
let container = document.querySelector(".card");

if(order){
    let productList = "";
    order.cart.forEach(item => {
        productList += `
            <li class="list-group-item d-flex justify-content-between">
                <span>${item.name} (x${item.quantity})</span>
                <span>${(item.price * item.quantity).toLocaleString()}đ</span>
            </li>
        `;
    });

    container.innerHTML = `
        <h2 class="text-success mb-3">
            <i class="bi bi-check-circle-fill"></i>
            Đặt hàng thành công!
        </h2>

        <p class="mb-4">Cảm ơn bạn đã tin tưởng và mua hàng tại Rau Sạch.</p>

        <p><strong>Mã đơn:</strong> ${order.id}</p>
        <p><strong>Khách hàng:</strong> ${order.customer.name}</p>
        <p><strong>Phương thức thanh toán:</strong> ${order.payment}</p>

        <ul class="list-group mb-3">
            ${productList}
        </ul>

        <h5 class="text-danger">
            Tổng tiền: ${order.total.toLocaleString()}đ
        </h5>

        <a href="homepage.html" class="btn btn-success mt-3">
            Quay về trang chủ
        </a>
    `;

    //xóa order laoij trừ F5 lại web
    localStorage.removeItem("order");

}else{

    //không có đơn -> không được 
    container.innerHTML = `
        <h2 class="text-danger mb-3">
            <i class="bi bi-x-circle-fill"></i>
            Không có đơn hàng!
        </h2>

        <p>Bạn không có đơn hàng hợp lệ để thanh toán.</p>

        <a href="homepage.html" class="btn btn-secondary mt-3">
            Quay về trang chủ
        </a>
    `;

}
</script>
</body>
</html>
